name: GitHub Metrics
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # =========================================
      # LEFT PANEL
      # =========================================
      - name: Left Panel
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics-left.svg
          token: ${{ secrets.METRICS }}
          user: KRYSTALM7
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Asia/Kolkata
          plugins_errors_fatal: no
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_lines: yes
          plugin_lines_history_limit: 5
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          plugin_followup: yes
          plugin_followup_sections: repositories
          output_action: commit
          committer_branch: main

      # =========================================
      # ACTIVITY PANEL
      # =========================================
      - name: Activity Panel
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics-activity.svg
          token: ${{ secrets.METRICS }}
          user: KRYSTALM7
          base: ""
          config_timezone: Asia/Kolkata
          plugins_errors_fatal: no
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes
          plugin_activity_skipped: KRYSTALM7/KRYSTALM7
          output_action: commit
          committer_branch: main

      # =========================================
      # RIGHT PANEL
      # =========================================
      - name: Right Panel
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics-right.svg
          token: ${{ secrets.METRICS }}
          user: KRYSTALM7
          base: ""
          config_timezone: Asia/Kolkata
          plugins_errors_fatal: no
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_people: yes
          plugin_people_types: followers
          plugin_people_limit: 20
          plugin_people_size: 28
          output_action: commit
          committer_branch: main

      # =========================================
      # LEETCODE PANEL (standalone)
      # =========================================
      - name: LeetCode Panel
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics-leetcode.svg
          token: ${{ secrets.METRICS }}
          user: KRYSTALM7
          base: ""
          config_timezone: Asia/Kolkata
          plugins_errors_fatal: no
          plugin_leetcode: yes
          plugin_leetcode_user: SujanKumar
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_recent: 3
          plugin_leetcode_limit_skills: 14
          output_action: commit
          committer_branch: main